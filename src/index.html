<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal d'Informació - FC Barcelona</title>
    
    <style>
        /* CSS molt bàsic per a principiants */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Capçalera simple */
        header {
            background-color: #004D98; /* Blau Barça */
            color: white;
            padding: 20px;
            text-align: center;
        }

        .nav-menu {
            list-style-type: none;
            padding: 0;
            margin: 10px 0 0 0;
        }

        .nav-menu li {
            display: inline;
            margin: 0 10px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-menu a:hover {
            color: #EDBB00; /* Groc Barça */
        }

        .nav-menu a.active {
            text-decoration: underline;
            color: #EDBB00;
        }

        /* Contingut principal */
        main {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
        }

        section {
            display: none;
        }

        section.active {
            display: block;
        }

        h2 {
            color: #A50044; /* Grana Barça */
            border-bottom: 2px solid #A50044;
            padding-bottom: 5px;
        }

        /* Filtres */
        .filters {
            margin-bottom: 20px;
        }

        .btn-filter {
            padding: 10px;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .btn-filter.active {
            background-color: #004D98;
            color: white;
        }

        /* Graella de jugadors (CSS Grid bàsic) */
        .grid-jugadors {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            background-color: #fafafa;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
            color: #004D98;
        }

        .btn-fav {
            padding: 5px 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-fav.es-favorit {
            background-color: #EDBB00;
            font-weight: bold;
        }

        /* Infermeria */
        .hospital-item {
            border: 1px solid #ffcccc;
            background-color: #fff0f0;
            padding: 15px;
            margin-bottom: 10px;
        }

        /* Taules d'estadístiques */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        /* Modal bàsic */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.5); 
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto; 
            padding: 20px;
            border: 1px solid #888;
            width: 60%; 
        }

        .close-modal {
            color: red;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .error-msg {
            color: red;
            font-weight: bold;
            padding: 20px;
            border: 1px solid red;
            background-color: #ffe6e6;
        }

    </style>
</head>
<body>

    <header>
        <h1>Portal FC Barcelona</h1>
        <ul class="nav-menu">
            <li><a class="nav-item active" data-target="plantilla">La Plantilla</a></li>
            <li><a class="nav-item" data-target="infermeria">Infermeria</a></li>
            <li><a class="nav-item" data-target="stats">Estadístiques</a></li>
        </ul>
    </header>

    <main>
        <!-- SECCIÓ PLANTILLA -->
        <section id="plantilla" class="active">
            <h2>Plantilla Actual</h2>
            
            <div class="filters">
                <button class="btn-filter active" data-pos="ALL">Tots</button>
                <button class="btn-filter" data-pos="DEL">Davanters</button>
                <button class="btn-filter" data-pos="MIG">Migcampistes</button>
                <button class="btn-filter" data-pos="DEF">Defenses</button>
                <button class="btn-filter" data-pos="POR">Porters</button>
            </div>

            <div class="grid-jugadors" id="jugadorsGrid">
                <!-- Els jugadors apareixeran aquí -->
            </div>
        </section>

        <!-- SECCIÓ INFERMERIA -->
        <section id="infermeria">
            <h2>Infermeria</h2>
            <div id="hospitalList">
                <!-- Els lesionats apareixeran aquí -->
            </div>
        </section>

        <!-- SECCIÓ ESTADÍSTIQUES -->
        <section id="stats">
            <h2>Estadístiques</h2>
            
            <h3>Màxims Golejadors</h3>
            <table>
                <thead><tr><th>Jugador</th><th>Gols</th></tr></thead>
                <tbody id="topGolsBody"></tbody>
            </table>

            <h3>Màxims Assistents</h3>
            <table>
                <thead><tr><th>Jugador</th><th>Assistències</th></tr></thead>
                <tbody id="topAssistBody"></tbody>
            </table>
        </section>
    </main>

    <!-- Modal simple -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Variables globals
        let playersData = [];
        let currentFilter = 'ALL';

        // Navegació de pestanyes
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('section');

        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                // Treure active a tots
                navItems.forEach(nav => nav.classList.remove('active'));
                sections.forEach(sec => sec.classList.remove('active'));
                
                // Posar active al que hem clicat
                e.target.classList.add('active');
                const targetId = e.target.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });

        // Filtres
        const filterBtns = document.querySelectorAll('.btn-filter');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-pos');
                renderPlantilla();
            });
        });

        // ÚS DE FETCH I ASYNC/AWAIT (Requisit del projecte)
        async function loadData() {
            try {
                const response = await fetch('players.json');
                if (!response.ok) {
                    throw new Error("No s'ha pogut carregar l'arxiu JSON.");
                }
                playersData = await response.json();
                
                renderPlantilla();
                renderInfermeria();
                renderStats();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('jugadorsGrid').innerHTML = 
                    "<div class='error-msg'>Error carregant dades. Obre amb Live Server!</div>";
            }
        }

        // Mostrar Plantilla (.map i .filter)
        function renderPlantilla() {
            const grid = document.getElementById('jugadorsGrid');
            
            // Ús de .filter()
            let filteredPlayers = playersData;
            if (currentFilter !== 'ALL') {
                filteredPlayers = playersData.filter(p => p.position === currentFilter);
            }

            const idFavorit = localStorage.getItem('jugador_favorit');

            // Ús de .map()
            grid.innerHTML = filteredPlayers.map(p => {
                let isFav = (parseInt(idFavorit) === p.id);
                let favClass = isFav ? "es-favorit" : "";
                let favText = isFav ? "★ Favorit" : "☆ Marcar Favorit";
                
                return `
                <div class="card">
                    <img src="\${p.image}" alt="\${p.name}" onclick="openModal(\${p.id})">
                    <h3>\${p.name}</h3>
                    <p>Posició: \${p.position}</p>
                    <p>Dorsal: \${p.number}</p>
                    <button class="btn-fav \${favClass}" onclick="toggleFavorit(\${p.id})">\${favText}</button>
                </div>
                `;
            }).join('');
        }

        // LocalStorage per Favorits
        window.toggleFavorit = function(playerId) {
            const currentFav = localStorage.getItem('jugador_favorit');
            if (currentFav == playerId) {
                localStorage.removeItem('jugador_favorit');
            } else {
                localStorage.setItem('jugador_favorit', playerId);
            }
            renderPlantilla();
        }

        // Modal simple
        const modal = document.getElementById('playerModal');
        const closeModalBtn = document.getElementById('closeModal');

        window.openModal = function(playerId) {
            const player = playersData.find(p => p.id === playerId);
            if (player) {
                document.getElementById('modalBody').innerHTML = `
                    <h2>\${player.name}</h2>
                    <p><strong>Gols:</strong> \${player.goals}</p>
                    <p><strong>Assistències:</strong> \${player.assists}</p>
                    <p><strong>Targetes Grogues:</strong> \${player.yellowCards}</p>
                    <p><strong>Salari:</strong> \${player.salary} €</p>
                    <p><strong>Valor:</strong> \${player.value} €</p>
                `;
                modal.style.display = "block";
            }
        }

        closeModalBtn.onclick = function() {
            modal.style.display = "none";
        }

        // Infermeria (.filter)
        function renderInfermeria() {
            const container = document.getElementById('hospitalList');
            const injured = playersData.filter(p => p.injured === true);

            if (injured.length === 0) {
                container.innerHTML = "<p>No hi ha lesionats actualment.</p>";
                return;
            }

            container.innerHTML = injured.map(p => `
                <div class="hospital-item">
                    <h3>\${p.name}</h3>
                    <p>Motiu: \${p.injuryDesc}</p>
                </div>
            `).join('');
        }

        // Estadístiques (.sort i .slice)
        function renderStats() {
            // Ordenar per gols
            const gols = [...playersData].sort((a,b) => b.goals - a.goals).slice(0,5);
            document.getElementById('topGolsBody').innerHTML = gols.map((p, i) => `
                <tr>
                    <td>\${i+1}. \${p.name}</td>
                    <td>\${p.goals}</td>
                </tr>
            `).join('');

            // Ordenar per assistències
            const assists = [...playersData].sort((a,b) => b.assists - a.assists).slice(0,5);
            document.getElementById('topAssistBody').innerHTML = assists.map((p, i) => `
                <tr>
                    <td>\${i+1}. \${p.name}</td>
                    <td>\${p.assists}</td>
                </tr>
            `).join('');
        }

        // Inicialitzar al carregar
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
